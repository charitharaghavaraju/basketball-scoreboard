<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="header">
            <h1 id="score-head">Basketball Scoreboard</h1>
            <div class="container">
                <div>
                    <h3 class="heading">HOME</h3>
                    <h2 class="score" id="home-score">0</h2>
                    <div class="buttons">
                        <button id="score-button" onclick="incrementHomeScore1()">+1</button>
                        <button id="score-button" onclick="incrementHomeScore2()">+2</button>
                        <button id="score-button" onclick="incrementHomeScore3()">+3</button>
                    </div>
                    
                </div>
                <div>
                    <h3 class="heading">GUEST</h3>
                    <h2 class="score" id="guest-score">0</h2>
                    <div class="buttons">
                        <button id="score-button" onclick="incrementGuestScore1()">+1</button>
                        <button id="score-button" onclick="incrementGuestScore2()">+2</button>
                        <button id="score-button" onclick="incrementGuestScore3()">+3</button>
                    </div>
                </div>
            </div>
            <div>
                <button id="reset-button" onclick="resetScores()">Reset (New Game)</button>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
